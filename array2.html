<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
</head>
<body>
    <p id="naqvi"></p>
    <p id="fatima"></p>
    <p id="malaga"></p>
    <script>
        var colors= ["green", "white", "black"]
        document.getElementById("naqvi").innerHTML= colors.join("O");

        document.getElementById("fatima").innerHTML=colors.pop();

        document.getElementById("malaga").innerHTML=colors;
    </script>
</body>
</html>
