<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="fati"></p>
    <script>
        var text="";
        var i=2;
        while(i<11){
            text=text+ "<br>The number is " +i;
            i++
        }
        document.getElementById("fati").innerHTML=text;
    </script>
</body>
</html>
